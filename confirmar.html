<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Confirmar Pedido | STR Blox Fruits</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0b0b0b;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:#141414;
    padding:30px;
    border-radius:15px;
    width:100%;
    max-width:420px;
    box-shadow:0 0 30px rgba(0,0,0,.6);
}

.logo{
    display:block;
    margin:0 auto 15px;
    width:120px;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.pedido{
    background:#1e1e1e;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    font-size:14px;
}

.pedido span{
    color:#9f6bff;
    font-weight:bold;
}

textarea{
    width:100%;
    height:130px;
    background:#0f0f0f;
    color:#fff;
    border:1px solid #333;
    border-radius:8px;
    padding:10px;
    resize:none;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
}

.copy{
    background:#9f6bff;
    color:#000;
    font-weight:bold;
}

.wp1{
    background:#25D366;
    color:#000;
}

.wp2{
    background:#1ebe5d;
    color:#000;
}

.nequi{
    margin-top:10px;
    color:#ff4d4d;
    font-weight:bold;
    text-align:center;
}

.terms{
    font-size:12px;
    margin-top:15px;
    color:#bbb;
}
</style>
</head>

<body>

<div class="card">

<img src="img/logo.png" class="logo">

<h1>Confirmar pedido</h1>

<div class="pedido">
Pedido: <span id="pedidoID"></span><br>
Producto: <span id="producto"></span><br>
Precio: <span id="precio"></span>
</div>

<textarea id="mensaje" readonly></textarea>

<button class="copy" onclick="copiar()">📋 Copiar mensaje</button>
<button class="wp1" onclick="wp('573004807548')">WhatsApp #1</button>
<button class="wp2" onclick="wp('573022162454')">WhatsApp #2</button>

<div class="nequi">
⚠️ Pagos únicamente por NEQUI
</div>

<div class="terms">
Al continuar aceptas nuestros términos y condiciones.<br>
El pedido solo se procesa después de confirmar el pago.
</div>

</div>

<script>
// ================= PEDIDO AUTOINCREMENTAL =================
let ultimoPedido = localStorage.getItem("str_pedido");

if (!ultimoPedido) {
    ultimoPedido = 1;
} else {
    ultimoPedido = parseInt(ultimoPedido) + 1;
}

localStorage.setItem("str_pedido", ultimoPedido);

const pedidoFormateado = "STR-" + String(ultimoPedido).padStart(5, "0");
document.getElementById("pedidoID").innerText = pedidoFormateado;

// ================= LEER PRODUCTO Y PRECIO =================
const params = new URLSearchParams(window.location.search);

const producto = params.get("producto") || "No especificado";
const precio = params.get("precio") || "No especificado";

document.getElementById("producto").innerText = producto;
document.getElementById("precio").innerText = precio;

// ================= MENSAJE =================
const texto = `Hola, quiero hacer un pedido en STR Blox Fruits.

🧾 Pedido: ${pedidoFormateado}
🎮 Producto: ${producto}
💰 Precio: ${precio}
💳 Pago: Nequi

Quedo atento, gracias.`;

document.getElementById("mensaje").value = texto;

function copiar(){
    navigator.clipboard.writeText(texto);
    alert("Mensaje copiado ✔");
}

function wp(num){
    const msg = encodeURIComponent(texto);
    window.open(`https://wa.me/${num}?text=${msg}`, "_blank");
}
</script>

</body>
</html>
